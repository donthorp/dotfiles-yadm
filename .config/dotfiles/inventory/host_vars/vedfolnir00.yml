---
# vedfolnir00 — Framework Desktop, Ryzen AI Max+ 395, 128GB LPDDR5x
# Location: CE193 | OS: Ubuntu Server 24.04 | Role: AI inference

# ROCm — gfx1151 (Radeon 890M iGPU), up to 116GB GTT via scatter-gather
# sg_display=0: allows iGPU to use system RAM beyond the display reservation.
# gttsize: sets the GTT (scatter-gather) pool in MB; defaults to half of RAM.
#   116 GB (118784 MB) leaves ~9 GB guaranteed for the OS on this 128 GB system.
rocm_grub_cmdline: "quiet splash amdgpu.sg_display=0 amdgpu.gttsize=118784"

# LiteLLM — set to Tailscale IP once known
tailscale_ip: "100.115.44.2"
ollama_listen_address: "127.0.0.1"
litellm_listen_address: "100.115.44.2"

# NPU (XDNA 3) — experimental; enable once Lemonade/FastFlowLM is validated
inference_enable_npu: false

# Network — RTL8126 ethernet (requires r8126 DKMS driver; r8169 must be blacklisted)
ethernet_mac: "9c:bf:0d:01:ce:56"
wifi_mac: "44:f7:9f:da:bd:a1"
install_realtek_r8126: true
