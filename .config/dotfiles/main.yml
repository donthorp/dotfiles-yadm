---
- name: "Don Dotfiles Host"
  hosts: localhost
  connection: local
  vars:
    neovim_nvim_version: stable
  roles:
    - base
    - neovim
    - babashka
  tags: base

- name: DevOps
  hosts: localhost
  connection: local
  become: false
  roles:
    - devops
    - role: terraform
      become: true
  tags: devops

- name: Workstation
  hosts: localhost
  connection: local
  become: false
  roles:
    - workstation
  tags: workstation
