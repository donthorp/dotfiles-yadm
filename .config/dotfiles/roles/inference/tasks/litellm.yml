---
# LiteLLM proxy — bridges Anthropic API format (Claude Code) to local ollama/lemonade.
# Listens on Tailscale IP; backends stay on localhost only.

- name: Install python3-venv
  become: true
  ansible.builtin.apt:
    name: python3-venv
    state: present
  tags: inference

- name: Create LiteLLM virtualenv
  become: true
  ansible.builtin.command:
    cmd: python3 -m venv /opt/litellm
    creates: /opt/litellm/bin/activate
  tags: inference

- name: Install LiteLLM into virtualenv
  become: true
  ansible.builtin.pip:
    name: "litellm[proxy]"
    virtualenv: /opt/litellm
    state: present
  tags: inference

- name: Create LiteLLM config directory
  become: true
  ansible.builtin.file:
    path: /etc/litellm
    state: directory
    mode: "0755"
  tags: inference

- name: Template LiteLLM config
  become: true
  ansible.builtin.template:
    src: litellm_config.yml.j2
    dest: /etc/litellm/config.yml
    mode: "0644"
  notify: restart litellm
  tags: inference

- name: Template LiteLLM systemd service
  become: true
  ansible.builtin.template:
    src: litellm.service.j2
    dest: /etc/systemd/system/litellm.service
    mode: "0644"
  notify:
    - reload systemd
    - restart litellm
  tags: inference

- name: Enable and start LiteLLM service
  become: true
  ansible.builtin.systemd:
    name: litellm
    enabled: true
    state: started
  tags: inference
