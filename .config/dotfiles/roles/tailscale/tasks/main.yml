---
- name: Stop packagekitd to release APT lock
  become: true
  ansible.builtin.systemd:
    name: packagekit
    state: stopped
  failed_when: false
  tags: [common, tailscale]

- name: Install Tailscale GPG key
  become: true
  ansible.builtin.shell:
    cmd: curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/{{ ansible_distribution_release }}.gpg | gpg --yes --dearmor -o /usr/share/keyrings/tailscale-archive-keyring.gpg
  changed_when: false
  tags: [common, tailscale]

- name: Add Tailscale APT repository
  become: true
  ansible.builtin.copy:
    content: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/ubuntu {{ ansible_distribution_release }} main\n"
    dest: /etc/apt/sources.list.d/tailscale.list
    mode: "0644"
  tags: [common, tailscale]

- name: Update apt cache
  become: true
  ansible.builtin.shell:
    cmd: apt-get update
  register: apt_update
  changed_when: false
  failed_when: >
    apt_update.rc != 0 and
    'pkgs.tailscale.com' in apt_update.stderr
  tags: [common, tailscale]

- name: Install Tailscale
  become: true
  ansible.builtin.apt:
    name: tailscale
    state: present
  tags: [common, tailscale]

- name: Enable tailscaled service
  become: true
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started
  tags: [common, tailscale]

- name: Authenticate with Tailscale
  become: true
  ansible.builtin.command:
    cmd: "tailscale up --authkey={{ tailscale_auth_key }}"
  when: tailscale_auth_key | length > 0
  changed_when: true
  no_log: true
  tags: [common, tailscale]
