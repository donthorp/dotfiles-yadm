---
- name: Install Tailscale GPG key
  become: true
  ansible.builtin.get_url:
    url: https://pkgs.tailscale.com/stable/ubuntu/noble.gpg
    dest: /etc/apt/keyrings/tailscale.gpg
    mode: "0644"
  tags: [common, tailscale]

- name: Add Tailscale APT repository
  become: true
  ansible.builtin.apt_repository:
    filename: tailscale
    repo: "deb [signed-by=/etc/apt/keyrings/tailscale.gpg] https://pkgs.tailscale.com/stable/ubuntu {{ ansible_distribution_release }} main"
    update_cache: true
  tags: [common, tailscale]

- name: Install Tailscale
  become: true
  ansible.builtin.apt:
    name: tailscale
    state: present
  tags: [common, tailscale]

- name: Enable tailscaled service
  become: true
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started
  tags: [common, tailscale]

- name: Authenticate with Tailscale
  become: true
  ansible.builtin.command:
    cmd: "tailscale up --authkey={{ tailscale_auth_key }}"
  when: tailscale_auth_key | length > 0
  changed_when: true
  no_log: true
  tags: [common, tailscale]
