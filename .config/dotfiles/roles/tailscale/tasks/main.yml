---
- name: Stop packagekitd to release APT lock
  become: true
  ansible.builtin.systemd:
    name: packagekit
    state: stopped
  failed_when: false
  tags: [common, tailscale]

- name: Download Tailscale GPG key
  become: true
  ansible.builtin.get_url:
    url: https://pkgs.tailscale.com/stable/ubuntu/{{ ansible_distribution_release }}.gpg
    dest: /tmp/tailscale.gpg.asc
    mode: "0644"
    force: true
  tags: [common, tailscale]

- name: Dearmor Tailscale GPG key
  become: true
  ansible.builtin.command:
    cmd: gpg --yes --dearmor -o /usr/share/keyrings/tailscale-archive-keyring.gpg /tmp/tailscale.gpg.asc
    creates: /usr/share/keyrings/tailscale-archive-keyring.gpg
  tags: [common, tailscale]

- name: Add Tailscale APT repository
  become: true
  ansible.builtin.copy:
    content: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/ubuntu {{ ansible_distribution_release }} main\n"
    dest: /etc/apt/sources.list.d/tailscale.list
    mode: "0644"
  tags: [common, tailscale]

- name: Update apt cache
  become: true
  ansible.builtin.apt:
    update_cache: true
  failed_when: false
  tags: [common, tailscale]

- name: Install Tailscale
  become: true
  ansible.builtin.apt:
    name: tailscale
    state: present
  tags: [common, tailscale]

- name: Enable tailscaled service
  become: true
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started
  tags: [common, tailscale]

- name: Authenticate with Tailscale
  become: true
  ansible.builtin.command:
    cmd: "tailscale up --authkey={{ tailscale_auth_key }}"
  when: tailscale_auth_key | length > 0
  changed_when: true
  no_log: true
  tags: [common, tailscale]

- name: Get Tailscale IP
  ansible.builtin.command: tailscale ip -4
  register: _tailscale_ip
  changed_when: false
  failed_when: false
  tags: [common, tailscale]

- name: Set tailscale_ip fact
  ansible.builtin.set_fact:
    tailscale_ip: "{{ _tailscale_ip.stdout | trim }}"
  when: _tailscale_ip.rc == 0 and _tailscale_ip.stdout | trim
  tags: [common, tailscale]

- name: Tailscale not joined
  ansible.builtin.debug:
    msg: "Tailscale is not joined. Run 'sudo tailscale up' to join the tailnet, then re-run this playbook."
  when: _tailscale_ip.rc != 0 or not _tailscale_ip.stdout | trim
  tags: [common, tailscale]
