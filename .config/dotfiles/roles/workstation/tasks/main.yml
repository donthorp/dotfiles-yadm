---
# Workstation app installs — DE-agnostic.
# Desktop environment configuration is handled by the gnome or cosmic role.

- name: Install mpg123
  become: true
  ansible.builtin.apt:
    state: latest
    pkg: mpg123
  when: install_mpg123

- name: Install Discord
  become: false
  community.general.flatpak:
    name: com.discordapp.Discord
    method: user
    state: present
  when: install_discord
  tags: flatpak

- name: Configure and Install Wavebox
  include_tasks: ./roles/workstation/tasks/wavebox.yml
  when: install_wavebox

- name: Configure and Install ULauncher
  include_tasks: ./roles/workstation/tasks/ulauncher.yml
  when: install_ulauncher

- name: Install Obsidian
  become: false
  community.general.flatpak:
    name: md.obsidian.Obsidian
    method: user
    state: present
  when: install_obsidian
  tags: flatpak

- name: Install DBeaver Community
  become: false
  community.general.flatpak:
    name: io.dbeaver.DBeaverCommunity
    method: user
    state: present
  when: install_dbeaver
  tags: flatpak

- name: Install VLC
  become: false
  community.general.flatpak:
    name: org.videolan.VLC
    method: user
    state: present
  when: install_vlc
  tags: flatpak

- name: Install The Gimp
  become: false
  community.general.flatpak:
    name: org.gimp.GIMP
    method: user
    state: present
  when: install_gimp
  tags: flatpak

- name: Install Converseen for Image Conversion
  become: true
  ansible.builtin.apt:
    state: latest
    pkg: converseen
  when: install_converseen

- name: Install PDF Arranger
  become: false
  community.general.flatpak:
    name: com.github.jeromerobert.pdfarranger
    method: user
    state: present
  when: install_pdf_arranger
  tags: flatpak

- name: Install Parsec
  become: true
  ansible.builtin.apt:
    deb: https://builds.parsec.app/package/parsec-linux.deb
  when: install_parsec

- name: Install Inkscape
  include_tasks: ./roles/workstation/tasks/inkscape.yml
  when: install_inkscape

- name: Configure and Install Syncthing
  include_tasks: ./roles/workstation/tasks/syncthing.yml
  when: install_syncthing
