---
# Workstation app installs — DE-agnostic.
# Desktop environment configuration is handled by the gnome or cosmic role.

- name: Remove retired Launchpad PPAs
  become: true
  ansible.builtin.apt_repository:
    repo: "{{ item }}"
    state: absent
    update_cache: false
  loop:
    - ppa:inkscape.dev/stable
    - ppa:agornostal/ulauncher

- name: Install mpg123
  become: true
  ansible.builtin.apt:
    state: latest
    pkg: mpg123
  when: install_mpg123

- name: Install or remove Discord
  become: false
  community.general.flatpak:
    name: com.discordapp.Discord
    method: user
    state: "{{ install_discord | ternary('present', 'absent') }}"
  tags: flatpak

- name: Configure and Install Wavebox
  include_tasks: ./roles/workstation/tasks/wavebox.yml
  when: install_wavebox

- name: Configure and Install ULauncher
  include_tasks: ./roles/workstation/tasks/ulauncher.yml
  when: install_ulauncher

- name: Install or remove Obsidian
  become: false
  community.general.flatpak:
    name: md.obsidian.Obsidian
    method: user
    state: "{{ install_obsidian | ternary('present', 'absent') }}"
  tags: flatpak

- name: Install or remove DBeaver Community
  become: false
  community.general.flatpak:
    name: io.dbeaver.DBeaverCommunity
    method: user
    state: "{{ install_dbeaver | ternary('present', 'absent') }}"
  tags: flatpak

- name: Install or remove VLC
  become: false
  community.general.flatpak:
    name: org.videolan.VLC
    method: user
    state: "{{ install_vlc | ternary('present', 'absent') }}"
  tags: flatpak

- name: Install or remove GIMP
  become: false
  community.general.flatpak:
    name: org.gimp.GIMP
    method: user
    state: "{{ install_gimp | ternary('present', 'absent') }}"
  tags: flatpak

- name: Install Converseen for Image Conversion
  become: true
  ansible.builtin.apt:
    state: latest
    pkg: converseen
  when: install_converseen

- name: Install or remove PDF Arranger
  become: false
  community.general.flatpak:
    name: com.github.jeromerobert.pdfarranger
    method: user
    state: "{{ install_pdf_arranger | ternary('present', 'absent') }}"
  tags: flatpak
  register: _pdf_arranger
  failed_when: _pdf_arranger.failed and install_pdf_arranger

- name: Install Parsec
  become: true
  ansible.builtin.apt:
    deb: https://builds.parsec.app/package/parsec-linux.deb
  when: install_parsec

- name: Install Inkscape
  include_tasks: ./roles/workstation/tasks/inkscape.yml
  when: install_inkscape

- name: Configure and Install Syncthing
  include_tasks: ./roles/workstation/tasks/syncthing.yml
  when: install_syncthing
