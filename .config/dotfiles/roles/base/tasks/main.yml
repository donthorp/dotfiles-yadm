---
# tasks file for base

- name: Install Github CLI GPG Key
  become: true
  ansible.builtin.get_url:
    url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    dest: /etc/apt/keyrings/githubcli-archive-keyring.gpg
    mode: 0644

# TODO: automate retrieval of architecture
#
- name: Add Github CLI APT Repository
  ansible.builtin.apt_repository:
    filename: github-cli
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"

- name: Update APT repository if needed
  become: true
  ansible.builtin.apt:
    name: "*"
    state: latest

- name: Install Base Packages
  become: true
  ansible.builtin.apt: 
    state: latest
    pkg: 
    - ack 
    - autofs
    - ca-certificates 
    - curl
    - dos2unix
    - dirmngr
    - fzf
    - gawk
    - gh
    - git-extras
    - gnupg
    - inetutils-traceroute
    - jq
    - libfuse2
    - lsb-release
    - needrestart
    - nfs-common
    - openssh-server
    - python3-pip
    - ripgrep
    - snapd 
  tags: base

- name: Install Snaps
  become: true
  community.general.snap:
    name:
      - htop
  tags: base

- name: Install Edge Snaps
  community.general.snap:
    channel: "edge"
    name:
      - starship
  tags: base

- name: Install Classic Snaps
  community.general.snap:
    name:
      - espanso
    classic: true
  tags: base

- name: Configure Flatpak Repo - Flathub
  community.general.flatpak_remote:
    name: flathub
    state: present
    flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo

# Font tasks from https://github.com/jahrik/ansible-nvim

- name: Create ~/.local/share/fonts directory
  become: false
  file:
    path: ~/.local/share/fonts
    state: directory
    recurse: yes
    mode: 0755
  tags: base

- name: Download Fira Code Nerd Fonts
  become: false
  ansible.builtin.unarchive:
    src: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.0.2/FiraCode.zip 
    dest: ~/.local/share/fonts
    remote_src: yes
    creates: '~/.local/share/fonts/FiraCodeNerdFont-Regular.ttf'
  notify: fc-cache
  tags: base

- name: Show user path vars
  ansible.builtin.debug:
    msg:
      - "ansible_env.HOME={{ ansible_env.HOME | default('unset') }}"
      - "ansible_user_dir={{ ansible_user_dir | default('unset') }}"
      - "ansible_user_id={{ ansible_user_id | default('unset') }}"
- name: Install Libre Clarendon fonts
  vars:
    libre_clarendon_url: "https://codeload.github.com/impallari/Libre-Clarendon/zip/refs/heads/master"
    libre_clarendon_cache_dir: "{{ ansible_env.HOME }}/.cache/font-downloads"
    libre_clarendon_zip: "{{ libre_clarendon_cache_dir }}/libre-clarendon-master.zip"
    libre_clarendon_extract_dir: "{{ libre_clarendon_cache_dir }}/Libre-Clarendon-master"
    libre_clarendon_install_dir: "{{ ansible_env.HOME }}/.local/share/fonts/libre-clarendon"
  block:
    - name: Check whether Libre Clarendon is already installed
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/.local/share/fonts/libre-clarendon/LibreClarendon-Regular.ttf"
      register: libre_clarendon_installed
      tags: base

    - name: Ensure Libre Clarendon directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ ansible_env.HOME }}/.cache/font-downloads"
        - "{{ ansible_env.HOME }}/.local/share/fonts"
        - "{{ ansible_env.HOME }}/.local/share/fonts/libre-clarendon"
      tags: base

    - name: Download Libre Clarendon archive
      ansible.builtin.get_url:
        url: "https://codeload.github.com/impallari/Libre-Clarendon/zip/refs/heads/master"
        dest: "{{ ansible_env.HOME }}/.cache/font-downloads/libre-clarendon-master.zip"
        mode: "0644"
        force: false
      when: not libre_clarendon_installed.stat.exists
      tags: base

    - name: Extract Libre Clarendon archive
      ansible.builtin.unarchive:
        src: "{{ ansible_env.HOME }}/.cache/font-downloads/libre-clarendon-master.zip"
        dest: "{{ ansible_env.HOME }}/.cache/font-downloads"
        remote_src: true
        creates: "{{ ansible_env.HOME }}/.cache/font-downloads/Libre-Clarendon-master/fonts"
      when: not libre_clarendon_installed.stat.exists
      tags: base

    - name: Install Libre Clarendon font files
      ansible.builtin.shell: |
        find "{{ ansible_env.HOME }}/.cache/font-downloads/Libre-Clarendon-master/fonts" \
          \( -iname '*.ttf' -o -iname '*.otf' \) \
          -exec cp -f {} "{{ ansible_env.HOME }}/.local/share/fonts/libre-clarendon/" \;
      args:
        executable: /bin/bash
      when: not libre_clarendon_installed.stat.exists
      notify: fc-cache
  tags: base

- name: Ensure Inter font directories exist
  become: false
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ ansible_env.HOME }}/.local/share/fonts"
    - "{{ ansible_env.HOME }}/.local/share/fonts/inter"
    - "{{ ansible_env.HOME }}/.cache/font-downloads"
  tags: fonts

- name: Download Inter font release
  become: false
  ansible.builtin.get_url:
    url: https://github.com/rsms/inter/releases/download/v4.1/Inter-4.1.zip
    dest: "{{ ansible_env.HOME }}/.cache/font-downloads/inter-4.1.zip"
    mode: "0644"
  tags: fonts

- name: Extract Inter fonts
  become: false
  ansible.builtin.unarchive:
    src: "{{ ansible_env.HOME }}/.cache/font-downloads/inter-4.1.zip"
    dest: "{{ ansible_env.HOME }}/.local/share/fonts/inter"
    remote_src: true
    creates: "{{ ansible_env.HOME }}/.local/share/fonts/inter/Inter.ttc"
  notify: fc-cache
  tags: fonts

